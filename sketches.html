<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Эскизы — FZRTATTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Unbounded:wght@300;400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
  <style>
    .page-hero { padding:72px 0 48px;border-bottom:1px solid #151515; }
    .page-hero-inner { display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap; }
    .page-title { font-size:clamp(56px,8vw,110px); }
    .page-title em { color:var(--red);font-family:'EB Garamond',serif;font-style:italic; }
    .page-sub { font-family:'EB Garamond',serif;font-style:italic;font-size:18px;color:var(--muted);max-width:360px;line-height:1.6; }

    .packs-section { padding:60px 0; }
    .packs-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px; }

    .pack-card {
      overflow:hidden;
      cursor:pointer;
      transition:border-color .3s,transform .4s cubic-bezier(.23,1,.32,1);
    }
    .pack-card:hover { border-color:#2a2a2a;transform:translateY(-6px); }

    .pack-thumb-wrap { overflow:hidden;position:relative;}
    .pack-thumb {
      width:100%;height:auto;display:block;
      transition:filter .4s,transform .5s cubic-bezier(.23,1,.32,1);
    }
    .pack-card:hover .pack-thumb { transform:scale(1.02); }

    .pack-info {
      padding:18px 20px;display:flex;align-items:center;
      justify-content:space-between;border-top:1px solid #1a1a1a;
    }
    .pack-title { font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--white); }
    .pack-count { font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted); }
    .pack-arrow {
      width:30px;height:30px;border-radius:50%;
      background:var(--red-dim);border:1px solid rgba(232,37,26,.2);
      display:flex;align-items:center;justify-content:center;
      color:var(--red);font-size:17px;flex-shrink:0;
      transition:background .2s,transform .25s;
    }
    .pack-card:hover .pack-arrow { background:var(--red);color:#000;transform:rotate(45deg); }

    .pack-viewer {
      position:fixed;inset:0;background:rgba(0,0,0,.97);
      display:none;flex-direction:column;z-index:8500;
    }
    .pack-viewer.open { display:flex; }
    .pack-viewer-head {
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 28px;border-bottom:1px solid #1a1a1a;flex-shrink:0;
    }
    .pack-viewer-title { font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase; }
    .pack-viewer-close {
      width:38px;height:38px;background:#141414;border:1px solid #222;
      border-radius:50%;color:var(--text);font-size:22px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;
      line-height:1;
    }
    .pack-viewer-close:hover { background:var(--red);color:#000; }
    .pack-viewer-body { flex:1;overflow-y:auto;padding:24px; }
    .pack-viewer-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px; }
    .pack-viewer-grid .img-wrap {
      border-radius:var(--r);overflow:hidden;cursor:zoom-in;background:#111;
    }
    .pack-viewer-grid img {
      width:100%;height:auto;display:block;
      filter:grayscale(.4) contrast(1.1);
      transition:filter .3s,transform .3s;
      border:1px solid #1e1e1e;border-radius:var(--r);
    }
    .pack-viewer-grid img:hover { filter:grayscale(0);transform:scale(1.02); }

    /* плейсхолдер для отсутствующих изображений */
    .img-placeholder {
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      color:#666;font-family:'Oswald',sans-serif;font-size:14px;text-transform:uppercase;
      text-align:center;padding:12px;
    }

    @media(max-width:680px) {
      .packs-grid { grid-template-columns:1fr 1fr; }
      .pack-viewer-grid { grid-template-columns:1fr 1fr; }
    }
    @media(max-width:400px) {
      .packs-grid { grid-template-columns:1fr; }
    }

    /* ── SKETCH LIGHTBOX ── */
    .sk-lb {
      position:fixed;inset:0;background:rgba(0,0,0,.97);
      display:none;align-items:center;justify-content:center;
      z-index:9500;
    }
    .sk-lb.open { display:flex; }
    .sk-lb-img {
      max-width:90vw;max-height:90vh;
      object-fit:contain;border-radius:var(--r);
      border:1px solid #1e1e1e;
      user-select:none;
    }
    .sk-lb-close {
      position:absolute;top:20px;right:20px;
      width:44px;height:44px;background:#141414;
      border:1px solid #222;border-radius:50%;
      color:var(--text);font-size:22px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s,color .2s;line-height:1;
    }
    .sk-lb-close:hover { background:var(--red);color:#fff; }
    .sk-lb-nav {
      position:absolute;top:50%;transform:translateY(-50%);
      width:48px;height:48px;background:rgba(0,0,0,.6);
      border:1px solid #333;border-radius:50%;
      color:var(--white);font-size:24px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s;user-select:none;
    }
    .sk-lb-nav:hover { background:var(--red); }
    .sk-lb-prev { left:20px; }
    .sk-lb-next { right:20px; }
    .sk-lb-count {
      position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
      font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;
      color:var(--muted);background:rgba(0,0,0,.7);
      padding:5px 14px;border-radius:20px;
    }

    /* Курсор — скрыть на тач-устройствах */
    @media (hover: none) {
      #cur, #cur-r { display:none !important; }
      body { cursor:auto !important; }
    }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>
<div class="progress" id="prog"></div>

<div class="preloader" id="preloader">
  <div class="preloader-inner">
    <img src="0001-0200.gif" alt=""/>
    <!-- <div class="preloader-brand">FZR<span>.</span>TATTS</div> -->
  </div>
</div>

<header class="site-header">
  <div class="wrap">
    <a class="logo" href="index.html"><span class="logo-dot"></span>FZRTATTS</a>
    <nav class="nav" id="mainNav">
      <!-- добавим кнопку закрытия для мобильного меню -->
      <button class="nav-close" id="navClose">×</button>
      <a href="index.html" data-i18n="nav.portfolio">Портфолио</a>
      <a href="sketches.html" class="active" data-i18n="nav.sketches">Эскизы</a>
      <a href="services.html" data-i18n="nav.services">Услуги</a>
      <a href="certificate.html" data-i18n="nav.cert">Сертификат</a>
      <a href="healing.html" data-i18n="nav.heal">Заживление</a>
      <a href="#" class="accent book-btn" data-i18n="nav.book">Записаться</a>
    </nav>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="burger" id="burger"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<section class="page-hero">
  <div class="wrap page-hero-inner">
    <div>
      <div class="sec-eyebrow" data-i18n="sketches.sec">Коллекция</div>
      <h1 class="page-title"><span data-i18n="sketches.title">Эс</span><em data-i18n="sketches.title.em">кизы</em></h1>
    </div>
    <p class="page-sub" data-i18n="sketches.sub">Паки готовых эскизов. Каждая работа уникальна — набивается только один раз.</p>
  </div>
</section>

<section class="packs-section">
  <div class="wrap">
    <div class="packs-grid" id="packsGrid"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap foot">
    <span class="foot-left">© <span id="yr"></span> FZRTATTS</span>
    <nav class="foot-nav">
      <a href="index.html" data-i18n="nav.portfolio">Портфолио</a>
      <a href="services.html" data-i18n="nav.services">Услуги</a>
      <a href="https://t.me/" target="_blank">Telegram</a>
    </nav>
  </div>
</footer>

<!-- SKETCH LIGHTBOX -->
<div class="sk-lb" id="skLb">
  <button class="sk-lb-close" id="skLbClose">×</button>
  <button class="sk-lb-nav sk-lb-prev" id="skLbPrev">‹</button>
  <img class="sk-lb-img" id="skLbImg" src="" alt=""/>
  <button class="sk-lb-nav sk-lb-next" id="skLbNext">›</button>
  <div class="sk-lb-count" id="skLbCount"></div>
</div>

<!-- PACK VIEWER -->
<div class="pack-viewer" id="packViewer">
  <div class="pack-viewer-head">
    <span class="pack-viewer-title" id="pvTitle"></span>
    <button class="pack-viewer-close" id="pvClose">×</button>
  </div>
  <div class="pack-viewer-body">
    <div class="pack-viewer-grid" id="pvGrid"></div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal" id="bookModal">
  <div class="modal-box">
    <button class="modal-close" id="bookClose">×</button>
    <h3 class="modal-title" data-i18n="modal.title">Запись на сессию</h3>
    <form id="bookForm">
      <div class="form-row"><label data-i18n="modal.name">Имя</label><input type="text" name="name" required/></div>
      <div class="form-row"><label data-i18n="modal.contact">Telegram или телефон</label><input type="text" name="contact" required/></div>
      <div class="form-row"><label data-i18n="modal.idea">Опишите идею</label><textarea name="desc" required></textarea></div>
      <button type="submit" class="btn primary form-submit"><span data-i18n="modal.submit">Отправить заявку</span></button>
    </form>
    <div class="form-msg" id="formMsg"></div>
  </div>
</div>

<script>
// ==================== ПРЕЛОАДЕР ====================
// Скрываем прелоадер принудительно, если shared.js не сработал
(function hidePreloader() {
  const preloader = document.getElementById('preloader');
  if (preloader) {
    preloader.classList.add('gone');
  }
  // Также добавляем fallback через setTimeout на случай, если что-то ещё мешает
  setTimeout(() => {
    if (preloader && !preloader.classList.contains('gone')) {
      preloader.classList.add('gone');
    }
  }, 2000);
})();

// ==================== МОБИЛЬНОЕ МЕНЮ ====================
const burger = document.getElementById('burger');
const nav = document.getElementById('mainNav');
const navClose = document.getElementById('navClose');

function toggleMenu() {
  nav.classList.toggle('open');
  burger.classList.toggle('open');
}

if (burger) burger.addEventListener('click', toggleMenu);
if (navClose) navClose.addEventListener('click', toggleMenu);

// ==================== ДАННЫЕ ПАКОВ ====================
const packs = [
  {id:'pack01',title:'Pack 01',count:7, cover:'img/111.png', images:['photo_2025-08-21_12-43-02.jpg','photo_2025-08-21_12-43-06.jpg','photo_2025-08-21_12-43-09.jpg','photo_2025-08-21_12-43-11.jpg','photo_2025-08-21_12-43-14.jpg','photo_2025-08-21_12-43-17.jpg','photo_2025-08-21_12-43-19.jpg']},
  {id:'pack02',title:'Pack 02',count:4, cover:'img/22.png',  images:['./img/6/photo_2025-08-21_12-42-35.jpg','./img/6/photo_2025-08-21_12-42-38.jpg','./img/6/photo_2025-08-21_12-42-41.jpg','photo_2025-08-21_12-42-43.jpg']},
  {id:'pack03',title:'Pack 03',count:7, cover:'img/33.png', images:['./img/10/1.png','./img/10/2.png','./img/10/3.png','./img/10/4.png','./img/10/5.png','./img/10/6.png','7.png']},
  {id:'pack04',title:'Pack 04',count:8, cover:'img/44.png', images:['./img/11/1.png','./img/11/2.png','./img/11/3.png','./img/11/4.png','./img/11/5.png','./img/11/6.png','7.png','8.png']},
  {id:'pack05',title:'Pack 05',count:5, cover:'img/555.png', images:['./img/5/1.jpg','./img/5/2.jpg','./img/5/3.jpg','./img/5/4.jpg','./img/5/5.jpg']},
];

// Функция для нормализации массива изображений (чтобы всегда было нужное количество)
function normalizeImages(pack) {
  let imgs = pack.images || [];
  if (imgs.length === 0) {
    imgs = new Array(pack.count).fill(pack.cover);
  } else if (imgs.length < pack.count) {
    const needed = pack.count - imgs.length;
    const filler = new Array(needed).fill(pack.cover);
    imgs = imgs.concat(filler);
  }
  return imgs;
}

// Отрисовка карточек
const packsGrid = document.getElementById('packsGrid');
const packViewer = document.getElementById('packViewer');
const pvTitle = document.getElementById('pvTitle');
const pvGrid = document.getElementById('pvGrid');
const pvClose = document.getElementById('pvClose');

packs.forEach((pack, i) => {
  const card = document.createElement('div');
  card.className = 'pack-card reveal' + (i % 2 ? ' reveal-d1' : '');
  card.innerHTML = `
    <div class="pack-thumb-wrap">
      <img class="pack-thumb" src="${pack.cover}" alt="${pack.title}" loading="lazy"/>
    </div>
    <div class="pack-info">
      <div>
        <div class="pack-title">${pack.title}</div>
        <div class="pack-count" data-count="${pack.count}">${pack.count} эскизов</div>
      </div>
      <div class="pack-arrow">→</div>
    </div>
  `;
  const thumb = card.querySelector('.pack-thumb');
  thumb.onerror = function() {
    this.style.display = 'none';
    const wrap = this.parentNode;
    const placeholder = document.createElement('div');
    placeholder.className = 'img-placeholder';
    placeholder.textContent = pack.title;
    wrap.appendChild(placeholder);
  };
  card.addEventListener('click', () => openPack(pack));
  packsGrid.appendChild(card);
});

let currentPackImages = [];
let currentLbIndex = 0;

function openPack(pack) {
  const lang = localStorage.getItem('fzr_lang') || 'ru';
  const label = lang === 'en' ? 'sketches' : 'эскизов';
  pvTitle.textContent = `${pack.title} — ${pack.count} ${label}`;

  currentPackImages = normalizeImages(pack);

  pvGrid.innerHTML = currentPackImages.map((src, idx) => `
    <div class="img-wrap" data-idx="${idx}">
      <img src="${src}" alt="Эскиз ${idx+1}" loading="lazy"/>
    </div>
  `).join('');

  // Обработка ошибок загрузки детальных изображений
  const viewerImgs = pvGrid.querySelectorAll('img');
  viewerImgs.forEach(img => {
    img.onerror = function() {
      if (this.src !== pack.cover) {
        this.src = pack.cover;
      } else {
        this.style.display = 'none';
        const wrap = this.parentNode;
        if (!wrap.querySelector('.img-placeholder')) {
          const placeholder = document.createElement('div');
          placeholder.className = 'img-placeholder';
          placeholder.textContent = pack.title;
          wrap.appendChild(placeholder);
        }
      }
    };
  });

  // Клик по эскизу → лайтбокс
  pvGrid.querySelectorAll('.img-wrap').forEach(wrap => {
    wrap.addEventListener('click', () => {
      openLightbox(parseInt(wrap.dataset.idx));
    });
  });

  packViewer.classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ── ЛАЙТБОКС ──
const skLb      = document.getElementById('skLb');
const skLbImg   = document.getElementById('skLbImg');
const skLbCount = document.getElementById('skLbCount');
const skLbClose = document.getElementById('skLbClose');
const skLbPrev  = document.getElementById('skLbPrev');
const skLbNext  = document.getElementById('skLbNext');

function openLightbox(idx) {
  currentLbIndex = idx;
  updateLightbox();
  skLb.classList.add('open');
}

function updateLightbox() {
  skLbImg.src = currentPackImages[currentLbIndex];
  skLbCount.textContent = `${currentLbIndex + 1} / ${currentPackImages.length}`;
}

function lbPrev() {
  currentLbIndex = (currentLbIndex - 1 + currentPackImages.length) % currentPackImages.length;
  updateLightbox();
}
function lbNext() {
  currentLbIndex = (currentLbIndex + 1) % currentPackImages.length;
  updateLightbox();
}

skLbPrev.addEventListener('click', lbPrev);
skLbNext.addEventListener('click', lbNext);
skLbClose.addEventListener('click', () => skLb.classList.remove('open'));
skLb.addEventListener('click', e => { if (e.target === skLb) skLb.classList.remove('open'); });
document.addEventListener('keydown', e => {
  if (!skLb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbPrev();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'Escape')     skLb.classList.remove('open');
});

// Закрытие модалки
pvClose.addEventListener('click', () => {
  packViewer.classList.remove('open');
  document.body.style.overflow = '';
});
packViewer.addEventListener('click', e => {
  if (e.target === packViewer || e.target === packViewer.querySelector('.pack-viewer-body')) {
    packViewer.classList.remove('open');
    document.body.style.overflow = '';
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && packViewer.classList.contains('open')) {
    packViewer.classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ==================== ОБЩАЯ ИНИЦИАЛИЗАЦИЯ ====================
// Год в футере
document.getElementById('yr').textContent = new Date().getFullYear();

// Анимация появления элементов при скролле (reveal)
const reveals = document.querySelectorAll('.reveal');
function checkReveal() {
  reveals.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      el.classList.add('in');
    }
  });
}
window.addEventListener('scroll', checkReveal);
checkReveal();

// Простой скролл-прогресс
const prog = document.getElementById('prog');
window.addEventListener('scroll', () => {
  const winScroll = document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - window.innerHeight;
  const scrolled = (winScroll / height) * 100;
  prog.style.width = scrolled + '%';
});

// Кастомный курсор — только на устройствах с мышью
const cursor = document.getElementById('cur');
const cursorR = document.getElementById('cur-r');
const isTouch = window.matchMedia('(hover: none)').matches;
if (cursor && cursorR && !isTouch) {
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    cursorR.style.left = e.clientX + 'px';
    cursorR.style.top  = e.clientY + 'px';
  });
  document.body.style.cursor = 'none';
}

// Модалка записи (пример)
const bookBtn = document.querySelector('.book-btn');
const bookModal = document.getElementById('bookModal');
const bookClose = document.getElementById('bookClose');
if (bookBtn && bookModal && bookClose) {
  bookBtn.addEventListener('click', (e) => {
    e.preventDefault();
    bookModal.classList.add('open');
  });
  bookClose.addEventListener('click', () => {
    bookModal.classList.remove('open');
  });
  bookModal.addEventListener('click', (e) => {
    if (e.target === bookModal) bookModal.classList.remove('open');
  });
}
</script>

<!-- Подключаем shared.js (если есть) — он не должен мешать, но если его нет, всё уже работает -->
<script src="shared.js"></script>
</body>
</html>
